name: Deploy website

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate downloads manifest
        run: node scripts/generate-downloads-manifest.mjs

      - name: Generate analytics data
        run: node scripts/generate-analytics-data.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh site icons
        run: |
          mkdir -p website/assets/icons
          cp assets/icons/icon_32.png assets/icons/icon_64.png website/assets/icons/
          touch website/.nojekyll

      - uses: actions/configure-pages@v5

      - name: Wait for in-flight Pages deployments
        uses: softprops/turnstyle@v1
        with:
          poll-interval-seconds: 15
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Pause before deploy
        run: sleep 12

      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 1
        if: steps.deployment.outcome == 'failure'
        run: sleep 25

      - id: deployment2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 2
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        run: sleep 25

      - id: deployment3
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 3
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure' && steps.deployment3.outcome == 'failure'
        run: sleep 25

      - id: deployment4
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure' && steps.deployment3.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 4
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure' && steps.deployment3.outcome == 'failure' && steps.deployment4.outcome == 'failure'
        run: sleep 25

      - id: deployment5
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure' && steps.deployment3.outcome == 'failure' && steps.deployment4.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Verify deployment
        if: always()
        run: |
          if [ "${{ steps.deployment.outcome }}" = "success" ] \
            || [ "${{ steps.deployment2.outcome }}" = "success" ] \
            || [ "${{ steps.deployment3.outcome }}" = "success" ] \
            || [ "${{ steps.deployment4.outcome }}" = "success" ] \
            || [ "${{ steps.deployment5.outcome }}" = "success" ]; then
            echo "GitHub Pages deployment succeeded."
            exit 0
          fi
          echo "GitHub Pages deployment failed after 5 attempts."
          exit 1
