name: Deploy website

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate downloads manifest
        run: node scripts/generate-downloads-manifest.mjs

      - name: Refresh site icons
        run: |
          mkdir -p website/assets/icons
          cp assets/icons/icon_32.png assets/icons/icon_64.png website/assets/icons/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - id: deployment
        uses: actions/deploy-pages@v4
