<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:420px; height:260px; overflow:hidden; background:transparent; font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
.wrap {
  width:420px; height:260px;
  background:linear-gradient(135deg,#0e0a1c 0%,#1a0f30 50%,#0d0820 100%);
  border-radius:16px;
  border:1px solid rgba(140,80,255,0.3);
  box-shadow:0 20px 60px rgba(0,0,0,0.8), 0 0 40px rgba(100,40,200,0.15);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:14px; position:relative; overflow:hidden;
}
/* animated background orbs */
.orb { position:absolute; border-radius:50%; filter:blur(40px); animation:pulse 3s ease-in-out infinite; }
.orb1 { width:120px; height:120px; background:rgba(100,40,220,0.15); top:-20px; left:-20px; animation-delay:0s; }
.orb2 { width:100px; height:100px; background:rgba(40,100,220,0.12); bottom:-10px; right:-10px; animation-delay:1s; }
.orb3 { width:80px; height:80px; background:rgba(180,40,220,0.1); top:50%; right:20px; animation-delay:0.5s; }
@keyframes pulse { 0%,100%{opacity:0.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.1)} }

.splash-logo{
  width:88px;height:88px;border-radius:20px;flex-shrink:0;
  box-shadow:0 12px 40px rgba(124,58,237,.45),0 0 0 1px rgba(255,255,255,.08);
}

.brand { text-align:center; }
.brand-name { font-size:24px; font-weight:700; background:linear-gradient(135deg,#f3f0ff,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent; letter-spacing:3px; text-transform:uppercase; }
.brand-sub  { font-size:12px; color:rgba(196,181,253,0.75); margin-top:4px; letter-spacing:.15em; font-weight:500; }

.loader { width:180px; }
.loader-track { height:2px; background:rgba(255,255,255,0.08); border-radius:1px; overflow:hidden; }
.loader-bar   { height:100%; background:linear-gradient(90deg,#7c3aed,#4f46e5,#7c3aed); border-radius:1px; animation:load 1.8s ease-in-out; }
@keyframes load { 0%{width:0%;opacity:1} 70%{width:80%;opacity:1} 100%{width:100%;opacity:0.8} }
.loader-text { font-size:10px; color:rgba(180,150,255,0.45); text-align:center; margin-top:6px; letter-spacing:1px; }

.version { position:absolute; bottom:10px; right:14px; font-size:10px; color:rgba(180,150,255,0.3); }
</style>
</head>
<body>
<div class="wrap">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <img class="splash-logo" src="icons/icon_256.png" width="88" height="88" alt="Enigma"/>

  <div class="brand">
    <div class="brand-name">Enigma</div>
    <div class="brand-sub">Private &amp; fast</div>
  </div>

  <div class="loader">
    <div class="loader-track"><div class="loader-bar"></div></div>
    <div class="loader-text">Starting…</div>
  </div>

  <div class="version">v1.1.0</div>
</div>
</body>
</html>
